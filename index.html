<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAR REPORT</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1c1917;--charcoal:#2c2825;--warm:#44403c;--muted:#78716c;--stone:#a8a29e;--silk:#e7e0d8;--rice:#f5f0ea;--paper:#faf7f4;--white:#fff;--sage:#7c9a84;--matcha:#5c7a62;--terra:#c4714a;--gold:#b5924a;--border:rgba(44,40,37,.1);--shadow:0 2px 20px rgba(28,25,23,.08)}
html,body{height:100%;overflow-x:hidden}
body{font-family:'DM Sans','Noto Serif JP',sans-serif;background:var(--rice);color:var(--ink);display:flex;flex-direction:column;align-items:center;padding-bottom:80px}
.hdr{width:100%;background:var(--charcoal);padding:22px 28px 20px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px}
.hdr-sub{font-size:10px;color:var(--stone);letter-spacing:.25em;text-transform:uppercase;margin-bottom:3px}
.hdr-title{font-family:'Noto Serif JP',serif;font-weight:300;font-size:20px;color:var(--paper);letter-spacing:.15em}
.hdr-date{font-size:11px;color:var(--stone);letter-spacing:.08em}
.prog-wrap{width:100%;max-width:500px;padding:0 20px;margin-bottom:28px}
.prog-top{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:7px}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--silk);transition:all .3s}
.dot.done{background:var(--sage)}.dot.active{background:var(--charcoal);width:14px;border-radius:3px}
.prog-track{width:100%;height:2px;background:var(--silk);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--charcoal);border-radius:2px;transition:width .5s ease}
.card{width:100%;max-width:500px;padding:0 20px;animation:up .35s ease}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.ci{background:var(--white);border-radius:16px;padding:28px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stag{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.stag::before{content:'';display:block;width:14px;height:1px;background:var(--stone)}
.qlabel{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:400;color:var(--ink);line-height:1.6;margin-bottom:5px}
.qhint{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6}
input[type=text],input[type=number],input[type=date],select{width:100%;padding:13px 15px;background:var(--paper);border:1.5px solid var(--silk);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--charcoal);background:var(--white)}
input::placeholder{color:var(--stone)}
textarea{width:100%;padding:13px 15px;background:var(--paper);border:1.5px solid var(--silk);border-radius:10px;font-family:'DM Sans','Noto Serif JP',sans-serif;font-size:16px;color:var(--ink);outline:none;resize:vertical;min-height:80px;transition:border-color .2s;line-height:1.7}
textarea:focus{border-color:var(--charcoal);background:var(--white)}
textarea::placeholder{color:var(--stone)}
/* shop */
.shop-btn{width:100%;padding:24px;border-radius:14px;font-family:'Noto Serif JP',serif;font-size:26px;font-weight:400;letter-spacing:.2em;cursor:pointer;transition:all .25s;border:2px solid var(--silk);background:var(--white);color:var(--warm);margin-bottom:12px;display:block}
.shop-btn.on{border-color:var(--charcoal);background:var(--charcoal);color:var(--paper)}
/* staff */
.staff-suggest-wrap{position:relative;margin-bottom:8px}
.suggest-list{position:absolute;top:100%;left:0;right:0;background:var(--white);border:1.5px solid var(--charcoal);border-radius:10px;overflow:hidden;z-index:50;box-shadow:var(--shadow);margin-top:2px}
.suggest-item{padding:12px 16px;font-size:15px;color:var(--warm);cursor:pointer;border-bottom:1px solid var(--rice)}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover,.suggest-item:active{background:var(--rice)}
.staff-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:10px}
.staff-tag{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--charcoal);color:var(--paper);border-radius:20px;font-size:14px;font-weight:500}
.staff-tag-del{background:none;border:none;color:rgba(255,255,255,.6);font-size:15px;cursor:pointer;padding:0;line-height:1;margin-left:2px}
/* ticket */
.ticket-input-area{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;padding:16px;background:var(--paper);border:1.5px solid var(--silk);border-radius:12px}
.ticket-row{display:flex;gap:8px;align-items:center}
.ticket-no{flex:1.1;padding:11px 12px!important;font-size:16px!important;border-radius:8px!important;background:var(--white)!important}
.ticket-amt{flex:2;padding:11px 12px!important;font-size:16px!important;font-weight:500!important;border-radius:8px!important;background:var(--white)!important;text-align:right}
.pay-btns{display:flex;gap:6px}
.pay-btn{flex:1;padding:10px 4px;border-radius:8px;font-size:13px;font-weight:500;border:1.5px solid var(--silk);background:var(--white);color:var(--muted);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;text-align:center;white-space:nowrap}
.pay-btn.cash.on{border-color:var(--charcoal);background:var(--charcoal);color:var(--paper)}
.pay-btn.card.on{border-color:var(--sage);background:var(--sage);color:var(--white)}
.pay-btn.other.on{border-color:var(--gold);background:var(--gold);color:var(--white)}
.add-ticket-btn{width:100%;padding:12px;background:var(--charcoal);color:var(--paper);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.ticket-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-height:280px;overflow-y:auto}
.ticket-item{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:10px;font-size:14px}
.ticket-item.cash{background:rgba(44,40,37,.04);border:1px solid rgba(44,40,37,.1)}
.ticket-item.card{background:rgba(124,154,132,.08);border:1px solid rgba(124,154,132,.25)}
.ticket-item.other{background:rgba(181,146,74,.08);border:1px solid rgba(181,146,74,.25)}
.ticket-no-disp{color:var(--muted);font-size:12px;width:36px;flex-shrink:0}
.ticket-type-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0}
.ticket-item.cash .ticket-type-badge{background:rgba(44,40,37,.1);color:var(--warm)}
.ticket-item.card .ticket-type-badge{background:rgba(124,154,132,.2);color:var(--matcha)}
.ticket-item.other .ticket-type-badge{background:rgba(181,146,74,.2);color:var(--gold)}
.ticket-amt-disp{text-align:right;font-weight:600;color:var(--ink);font-size:15px;flex:1}
.ticket-del{width:22px;height:22px;background:none;border:1px solid var(--silk);border-radius:50%;color:var(--stone);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.ticket-summary{border-radius:12px;overflow:hidden;margin-bottom:6px}
.ts-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:14px}
.ts-cash{background:rgba(44,40,37,.06)}.ts-card{background:rgba(124,154,132,.1)}.ts-other{background:rgba(181,146,74,.08)}.ts-total{background:var(--charcoal)}
.ts-label{color:var(--warm);font-weight:500}.ts-total .ts-label{color:var(--stone);font-size:12px;letter-spacing:.08em}
.ts-val{font-weight:600;font-size:15px;color:var(--ink)}.ts-total .ts-val{color:var(--paper);font-size:18px}
.ts-empty{font-size:14px;color:var(--stone);text-align:center;padding:20px 0}
/* sales */
.srow{display:flex;align-items:center;gap:10px;background:var(--paper);border:1.5px solid var(--silk);border-radius:10px;padding:12px 15px;margin-bottom:10px;transition:border-color .2s}
.srow:focus-within{border-color:var(--charcoal);background:var(--white)}
.sicon{font-size:17px;width:26px;text-align:center}
.slabel{font-size:13px;color:var(--warm);width:55px;flex-shrink:0;font-weight:500}
.sinput{flex:1;border:none!important;background:transparent!important;padding:0!important;font-size:17px!important;font-weight:500!important;text-align:right;color:var(--ink)!important}
.sunit{font-size:12px;color:var(--muted);margin-left:3px}
.stotal{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;background:var(--charcoal);border-radius:10px;margin-top:2px}
.stotal-l{font-size:12px;color:var(--stone);letter-spacing:.1em}.stotal-v{font-size:20px;font-weight:500;color:var(--paper)}
.from-ticket-hint{font-size:12px;color:var(--sage);text-align:right;margin-bottom:8px}
/* safe */
.bills{display:grid;grid-template-columns:1fr;gap:7px;margin-bottom:10px}
.brow{display:flex;align-items:center;gap:7px;background:var(--paper);border:1.5px solid var(--silk);border-radius:10px;padding:9px 11px;transition:border-color .2s}
.brow:focus-within{border-color:var(--charcoal)}
.bdenom{font-size:13px;color:var(--muted);width:52px;flex-shrink:0}
.binput{flex:1;border:none!important;background:transparent!important;padding:0!important;font-size:16px!important;font-weight:500!important;text-align:right;color:var(--ink)!important}
.bunit{font-size:12px;color:var(--stone)}
.bdiff{font-size:12px;min-width:28px;text-align:right;flex-shrink:0}
.safe-section-label{font-size:13px;font-weight:600;color:var(--warm);margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.safe-section-label::after{content:'';flex:1;height:1px;background:var(--silk)}
.safe-subtotal{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--paper);border-radius:8px;margin-bottom:4px;font-size:14px}
.sresult{border-radius:10px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.sok{background:rgba(124,154,132,.12);border:1px solid rgba(124,154,132,.3)}.sng{background:rgba(196,113,74,.1);border:1px solid rgba(196,113,74,.3)}
.srlabel{font-size:13px;color:var(--warm)}.srval{font-size:19px;font-weight:600}
.sok .srval{color:var(--matcha)}.sng .srval{color:var(--terra)}
/* orders */
.orow{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--paper);border:1.5px solid var(--silk);border-radius:10px;margin-bottom:8px;transition:border-color .2s}
.orow:focus-within{border-color:var(--charcoal)}
.oname{font-size:14px;color:var(--warm);font-weight:500;flex:1}
.fix-qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.fix-qty{width:62px!important;text-align:right!important;font-size:16px!important;font-weight:500!important;padding:6px 8px!important;background:var(--white)!important;border-radius:7px!important}
.fix-unit{font-size:12px;color:var(--muted);white-space:nowrap;min-width:20px}
.drop-select{flex:1.6;padding:8px 10px!important;font-size:16px!important;border-radius:7px!important;background:var(--white)!important;border:1.5px solid var(--silk)!important}
.level-wrap{display:flex;gap:5px;flex-shrink:0}
.lvl-btn{padding:5px 10px;border-radius:20px;font-size:12px;border:1.5px solid var(--silk);background:var(--white);color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.lvl-btn.on{border-color:var(--charcoal);background:var(--charcoal);color:var(--paper)}
.free-name{flex:1.8;padding:7px 9px!important;font-size:16px!important;border-radius:7px!important;background:var(--white)!important}
.free-qty{flex:1;padding:7px 9px!important;font-size:16px!important;border-radius:7px!important;background:var(--white)!important}
.delbtn{width:26px;height:26px;background:none;border:1px solid var(--silk);border-radius:50%;color:var(--stone);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;line-height:1}
.addbtn{width:100%;padding:10px;background:none;border:1.5px dashed var(--silk);border-radius:10px;font-size:13px;color:var(--muted);cursor:pointer;letter-spacing:.08em;transition:all .2s;margin-bottom:4px;font-family:'DM Sans',sans-serif}
/* notice */
.rbox{background:rgba(181,146,74,.08);border:1.5px solid rgba(181,146,74,.3);border-radius:14px;padding:26px 22px;text-align:center}
.ricon{font-size:34px;margin-bottom:10px}.rtext{font-family:'Noto Serif JP',serif;font-size:16px;color:var(--warm);line-height:1.7}.rsub{font-size:12px;color:var(--muted);line-height:1.7;margin-top:6px}
.notice-box{border-radius:14px;padding:20px 18px;margin-bottom:14px;text-align:center}
.notice-green{background:rgba(124,154,132,.1);border:1.5px solid rgba(124,154,132,.35)}
.notice-amber{background:rgba(181,146,74,.08);border:1.5px solid rgba(181,146,74,.3)}
.notice-icon{font-size:28px;margin-bottom:8px}
.notice-text{font-family:'Noto Serif JP',serif;font-size:14px;color:var(--warm);line-height:1.8}
/* checklist */
.chklist{display:flex;flex-direction:column;gap:7px}
.chkitem{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--paper);border:1.5px solid var(--silk);border-radius:10px;cursor:pointer;transition:all .2s;user-select:none}
.chkitem.on{background:rgba(124,154,132,.08);border-color:rgba(124,154,132,.4)}
.chkitem.monthly{border-style:dashed}
.chkbox{width:20px;height:20px;border:2px solid var(--silk);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px}
.chkitem.on .chkbox{background:var(--sage);border-color:var(--sage);color:#fff}
.chklbl{font-size:14px;color:var(--warm);flex:1;transition:color .2s}
.chkitem.on .chklbl{color:var(--stone);text-decoration:line-through;text-decoration-color:var(--stone)}
.mbadge{font-size:9px;color:var(--gold);border:1px solid rgba(181,146,74,.4);border-radius:4px;padding:2px 6px;white-space:nowrap}
.cpbar{margin-top:12px}.cptrack{width:100%;height:3px;background:var(--silk);border-radius:2px;overflow:hidden;margin-bottom:5px}
.cpfill{height:100%;background:var(--sage);border-radius:2px;transition:width .4s ease}.cplbl{font-size:12px;color:var(--muted);text-align:center;letter-spacing:.1em}
/* glass */
.glassbtns{display:flex;gap:8px;margin-top:8px}
.gbtn{flex:1;padding:13px;border-radius:10px;font-size:13px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;border:1.5px solid var(--silk);background:var(--paper);color:var(--warm)}
.gbtn.on{border-color:var(--charcoal);background:var(--charcoal);color:var(--paper)}
.divider{width:100%;height:1px;background:var(--silk);margin:18px 0}
/* buttons */
.bp{width:100%;padding:15px;background:var(--charcoal);color:var(--paper);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:.08em;cursor:pointer;margin-top:22px;transition:all .2s}
.bp:hover{background:var(--ink);transform:translateY(-1px)}.bp:disabled{opacity:.35;cursor:not-allowed;transform:none}
.bs{width:100%;padding:13px;background:none;color:var(--muted);border:1.5px solid var(--silk);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:9px;transition:all .2s}
.bs:hover{border-color:var(--stone);color:var(--warm)}
.bsage{width:100%;padding:15px;background:var(--sage);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:22px;transition:all .2s}
.bsage:hover{background:var(--matcha)}
/* summary */
.ssec{margin-bottom:14px;background:var(--white);border-radius:14px;padding:20px;border:1px solid var(--border);box-shadow:var(--shadow)}
.stitle{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.stitle::after{content:'';flex:1;height:1px;background:var(--silk)}
.srow2{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--rice);font-size:14px}
.srow2:last-child{border-bottom:none}
.sk{color:var(--warm)}.sv{font-weight:500;color:var(--ink)}.stot{font-size:19px;font-weight:600;color:var(--charcoal)}
.ok{color:var(--matcha);font-weight:600}.ng{color:var(--terra);font-weight:600}
.linebox{background:var(--paper);border:1.5px solid var(--silk);border-radius:12px;padding:18px;font-size:12px;line-height:1.9;color:var(--warm);white-space:pre-wrap;font-family:'Noto Serif JP',sans-serif;margin-bottom:10px}
.copybtn{width:100%;padding:13px;background:var(--sage);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.08em;transition:all .2s}
.copybtn.done{background:var(--charcoal)}
.actrow{display:flex;gap:8px;margin-top:9px}.actrow .bs{margin-top:0;flex:1}
.send-status{text-align:center;margin-top:12px;font-size:12px;color:var(--muted);min-height:18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--charcoal);color:var(--paper);padding:11px 22px;border-radius:50px;font-size:12px;letter-spacing:.08em;transition:transform .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:400px){.bills{grid-template-columns:1fr}.ci{padding:22px 16px}}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-sub">Daily Report</div><div class="hdr-title" id="hdr-title">BAR NIGHT</div></div>
  <div class="hdr-date" id="hdate"></div>
</div>
<div class="prog-wrap">
  <div class="prog-top"><span id="plabel">STEP 1</span><div class="dots" id="dots"></div></div>
  <div class="prog-track"><div class="prog-fill" id="pfill"></div></div>
</div>
<div class="card" id="card"></div>
<div class="toast" id="toast"></div>

<script>
// ══ 設定 ══════════════════════════════════════════════
const SAFE_TARGET = 66500;
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwKuqdTL1WR-F54mbDrqmAEajX7u_fwjr4TjjjF2erogeY5_FcCTlyzm8baXlDXD-oq/exec';
const SHOPS   = ['雨','々'];
const MEMBERS = ['莉乃','もも','叶','とも','幸','あいり','ちひろ','竜','竜聖','まき','コウ'];
const MEMBER_YOMI = {'莉乃':'りの','もも':'もも','叶':'かな','とも':'とも','幸':'さち','あいり':'あいり','ちひろ':'ちひろ','竜':'りゅう','竜聖':'りゅうせい','まき':'まき','コウ':'こう'};
const FIXED   = [{name:'氷カット',unit:'袋'},{name:'丸氷',unit:'袋'},{name:'炭酸',unit:'ケース'}];
const DROPS   = ['タオル','おしぼり','ナッツ','ビーバー','ゴミ袋','洗剤'];
const LEVELS  = ['少ない','無し'];

// 金種（10000〜50、10円以下は不要）
const BILLS     = [10000,5000,1000,500,100,50];
const BILL_LBL  = {10000:'¥10,000',5000:'¥5,000',1000:'¥1,000',500:'¥500',100:'¥100',50:'¥50'};
// 釣り銭エリアのデフォルト目標枚数（両替用には目標なし）
const BILL_DEFAULT = {5000:3,1000:15,500:60,100:60,50:10}; // ¥10,000は目標なし

// ══ 状態 ══════════════════════════════════════════════
const S = {
  shop:'', date:'', staff:[], groups:'',
  tickets:[],
  // 売上は伝票から自動集計（手動上書き用フラグなし→常に伝票優先）
  other:'',  // その他売上のみ手動入力
  // 釣り銭（金種別）: change=釣り銭、exchange=両替用
  change:  {10000:0,5000:0,1000:0,500:0,100:0,50:0},
  exchange:{10000:0,5000:0,1000:0,500:0,100:0,50:0},
  diffReason:'',
  fix:{'氷カット':'','丸氷':'','炭酸':''},
  drops:[{name:'',level:''}], frees:[{name:'',qty:''}],
  chk:{}, glassOk:null, memo:''
};

let tNo='', tAmt='', tPay='', _composing=false;
let st=0;

// ══ ステップ ══════════════════════════════════════════
function buildSteps(){
  const s=['shop','basic','groups','tickets','sales','safe','orders','remind'];
  if(shouldShowGarbage()) s.push('garbage');
  s.push('check','handover','summary');
  return s;
}
let STEPS=buildSteps();

// ══ ユーティリティ ════════════════════════════════════
const p   = n=>String(n).padStart(2,'0');
const fd  = s=>{if(!s)return '';const[y,m,d]=s.split('-');return `${y}年${+m}月${+d}日`;};
const cn  = n=>Number(n||0).toLocaleString('ja-JP');
const fy  = n=>cn(n)+'円';

// 売上：現金＋カードは伝票合計、その他は手動
const salesCash  = ()=>ticketByPay('cash');
const salesCard  = ()=>ticketByPay('card');
const salesOther = ()=>ticketByPay('other')+(+S.other||0);
const totSales   = ()=>salesCash()+salesCard()+salesOther();

// 金庫
const changeTot   = ()=>BILLS.reduce((a,b)=>a+b*(+S.change[b]||0),0);
const exchangeTot = ()=>BILLS.reduce((a,b)=>a+b*(+S.exchange[b]||0),0);
const safeTot     = ()=>changeTot()+exchangeTot();
const safeDif     = ()=>safeTot()-SAFE_TARGET;

const ticketByPay = pay=>S.tickets.filter(t=>t.pay===pay).reduce((a,t)=>a+(+t.amt||0),0);
const ticketTot   = ()=>ticketByPay('cash')+ticketByPay('card')+ticketByPay('other');

function businessDate(){
  const now=new Date();
  if(now.getHours()<12){const prev=new Date(now);prev.setDate(prev.getDate()-1);return `${prev.getFullYear()}-${p(prev.getMonth()+1)}-${p(prev.getDate())}`;}
  return `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}`;
}
function businessDow(){return new Date(businessDate()).getDay();}
function shouldShowFridayAlert(){return businessDow()===5;}
function shouldShowGarbage(){return S.shop==='雨'&&(businessDow()===1||businessDow()===4);}
function isThursday(){return businessDow()===4;}
function isFirst(){return new Date(S.date||businessDate()).getDate()===1;}

function garbageItems(){
  const base=[{id:'burnable',lbl:'燃えるゴミ出す'}];
  if(isThursday()) base.push({id:'nonburnable',lbl:'燃えないゴミ出す（割れたグラス等）'});
  return base;
}
function chkItems(){
  const a=[
    {id:'drinks', lbl:'炭酸・トニック・ジンジャー・ビール補充'},
    {id:'ac',     lbl:'エアコン切る'},
    {id:'heat',   lbl:'暖房のコンセント抜く'},
    {id:'chg',    lbl:'充電器のコンセント抜く'},
    {id:'fridge', lbl:'冷蔵庫閉まってるか確認'},
    {id:'light',  lbl:'電気消す'},
    {id:'garbage',lbl:'ゴミ出し（ビン・缶・段ボールも）'},
  ];
  if(isFirst()) a.push({id:'sponge',lbl:'スポンジ交換',mo:true});
  return a;
}

// ══ プログレス ════════════════════════════════════════
function updProg(){
  const pct=((st+1)/STEPS.length*100).toFixed(0);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('plabel').textContent=`STEP ${st+1} / ${STEPS.length}`;
  document.getElementById('dots').innerHTML=STEPS.map((_,i)=>{const c=i<st?'done':i===st?'active':'';return `<div class="dot ${c}"></div>`;}).join('');
  const ht=document.getElementById('hdr-title');if(ht)ht.textContent=S.shop||'BAR NIGHT';
}

function render(){
  updProg();
  const now=new Date();
  document.getElementById('hdate').textContent=`${now.getFullYear()}.${p(now.getMonth()+1)}.${p(now.getDate())}`;
  const c=document.getElementById('card');
  const inner=document.createElement('div');inner.className='ci';
  const fns={shop,basic,groups,tickets,sales,safe,orders,remind,garbage,check,handover,summary};
  inner.innerHTML=fns[STEPS[st]]();
  c.innerHTML='';c.appendChild(inner);
  c.style.animation='none';requestAnimationFrame(()=>{c.style.animation='';c.className='card';});
}

  <div class="stag">日報完成</div>
  <div class="qlabel" style="margin-bottom:18px">本日もお疲れ様でした ✦</div>
  <div class="ssec"><div class="stitle">基本情報</div>
    <div class="srow2"><span class="sk">店舗</span><span class="sv">${S.shop}</span></div>
    <div class="srow2"><span class="sk">日付</span><span class="sv">${fd(S.date)}</span></div>
    <div class="srow2"><span class="sk">担当者</span><span class="sv">${S.staff.join('・')}</span></div>
    <div class="srow2"><span class="sk">来店組数</span><span class="sv">${S.groups}組</span></div>
  </div>
  ${ticketSection}
  <div class="ssec"><div class="stitle">売上合計</div>
    <div class="srow2"><span class="sk">現金</span><span class="sv">${fy(salesCash())}</span></div>
    <div class="srow2"><span class="sk">カード</span><span class="sv">${fy(salesCard())}</span></div>
    <div class="srow2"><span class="sk">その他</span><span class="sv">${fy(salesOther())}</span></div>
    <div class="srow2" style="padding-top:9px;border-top:1px solid var(--silk);margin-top:3px">
      <span class="sk" style="font-weight:600">合計</span><span class="stot">${tot.toLocaleString()} 円</span></div>
  </div>
  <div class="ssec"><div class="stitle">金庫確認</div>
    <div class="srow2"><span class="sk">${S.shop==='雨'?'夜雨':'釣り銭'}合計</span><span class="sv">${cn(changeTot())} 円</span></div>
    <div class="srow2"><span class="sk">${S.shop==='雨'?'昼雨':'両替用'}合計</span><span class="sv">${cn(exchangeTot())} 円</span></div>
    <div class="srow2"><span class="sk">金庫合計</span><span class="sv">${cn(safeTot())} 円</span></div>
    <div class="srow2"><span class="sk">目標</span><span class="sv">${cn(SAFE_TARGET)} 円</span></div>
    <div class="srow2"><span class="sk">差異</span><span class="${ok?'ok':'ng'}">${dlbl}</span></div>
    ${!ok&&S.diffReason?`<div class="srow2"><span class="sk">理由</span><span class="sv" style="font-size:12px">${S.diffReason}</span></div>`:''}
  </div>
  <div class="ssec"><div class="stitle">発注リスト</div>${ordRows}</div>
  <div class="ssec"><div class="stitle">引き継ぎ</div>
    <div class="srow2"><span class="sk">グラス洗い残し</span><span class="${gcls}">${gtxt}</span></div>
    ${S.memo?`<div style="margin-top:7px;font-size:13px;color:var(--warm);line-height:1.7">${S.memo.replace(/\n/g,'<br>')}</div>`:''}
  </div>
  <div class="ssec"><div class="stitle">LINE 送信テンプレ</div>
    <div class="linebox">${buildLine()}</div>
    <button class="copybtn" id="cbtn" onclick="cpLine()">📋 LINEテンプレをコピー</button>
  </div>
  <div class="send-status" id="send-status" style="color:var(--matcha)">✓ スプレッドシートに記録されました</div>
  <div class="actrow"><button class="bs" onclick="resetAll()">新しい日報</button></div>`;}

// ══ INTERACTIONS ══════════════════════════════════════

function selectShop(name){
  S.shop=name; STEPS=buildSteps();
  setTimeout(()=>{st=Math.min(st+1,STEPS.length-1);render();window.scrollTo({top:0,behavior:'smooth'});},300);
}

function onStaffInput(val){
  const list=document.getElementById('suggest-list');if(!list)return;
  const q=val.trim().toLowerCase();if(!q){list.style.display='none';return;}
  const matches=MEMBERS.filter(m=>{
    if(S.staff.includes(m))return false;
    const yomi=MEMBER_YOMI[m]||'';
    return m.startsWith(q)||yomi.startsWith(q)||yomi.includes(q);
  });
  if(matches.length===0){list.style.display='none';return;}
  list.innerHTML=matches.map(m=>`<div class="suggest-item" onclick="pickStaff('${m}')">${m}　<span style="font-size:11px;color:var(--stone)">${MEMBER_YOMI[m]}</span></div>`).join('');
  list.style.display='block';
}
function hideSuggest(){const list=document.getElementById('suggest-list');if(list)list.style.display='none';}
function pickStaff(name){
  if(!S.staff.includes(name))S.staff.push(name);
  const inp=document.getElementById('staff-input');if(inp){inp.value='';inp.focus();}
  hideSuggest();
  const tags=document.getElementById('staff-tags');
  if(tags)tags.innerHTML=S.staff.map((n,i)=>`<div class="staff-tag">${n}<button class="staff-tag-del" onclick="removeStaff(${i})">×</button></div>`).join('');
}
function removeStaff(i){
  S.staff.splice(i,1);
  const tags=document.getElementById('staff-tags');
  if(tags)tags.innerHTML=S.staff.map((n,idx)=>`<div class="staff-tag">${n}<button class="staff-tag-del" onclick="removeStaff(${idx})">×</button></div>`).join('');
}

function setPay(v){tPay=v;document.querySelectorAll('.pay-btn').forEach(b=>{b.classList.toggle('on',b.classList.contains(v));});}
function addTicket(){
  const no=document.getElementById('tNo')?.value?.trim()||'';
  const amt=document.getElementById('tAmt')?.value||'';
  if(!amt||+amt<=0){shToast('金額を入力してください');return;}
  if(!tPay){shToast('支払い方法を選択してください');return;}
  S.tickets.push({no,amt,pay:tPay});
  tNo='';tAmt='';tPay='';render();
  setTimeout(()=>document.getElementById('tNo')?.focus(),50);
}
function delTicket(i){S.tickets.splice(i,1);render();}

function cSalesOther(){
  const o=+document.getElementById('iother')?.value||0;
  S.other=String(o);
  const el=document.getElementById('stotv');
  if(el)el.textContent=(salesCash()+salesCard()+ticketByPay('other')+o).toLocaleString()+' 円';
}

function cSafe(){
  BILLS.forEach(b=>{
    const ec=document.querySelector(`[data-area="change"][data-b="${b}"]`);if(ec)S.change[b]=+ec.value||0;
    const ee=document.querySelector(`[data-area="exchange"][data-b="${b}"]`);if(ee)S.exchange[b]=+ee.value||0;
  });
  const cTot=changeTot(), eTot=exchangeTot(), tot=cTot+eTot, dif=tot-SAFE_TARGET, ok=dif===0;
  const bx=document.getElementById('sbox');
  if(bx){bx.className='sresult '+(ok?'sok':'sng');
    document.getElementById('stv').textContent=cn(tot);
    document.getElementById('sdv').textContent=dif===0?'差異なし ✓':(dif>0?`+${dif.toLocaleString()} 円`:`${dif.toLocaleString()} 円`);}
  const ct=document.getElementById('safe-c-tot');if(ct)ct.textContent=cn(cTot)+' 円';
  const et=document.getElementById('safe-e-tot');if(et)et.textContent=cn(eTot)+' 円';
  const rw=document.getElementById('rwrap');if(rw)rw.style.display=ok?'none':'';
}

function uFix(el){S.fix[el.dataset.fn]=el.value;}
function aDrop(){S.drops.push({name:'',level:''});render();}
function dDrop(i){S.drops.splice(i,1);if(S.drops.length===0)S.drops.push({name:'',level:''});render();}
function uDrop(el,f){S.drops[+el.dataset.di][f]=el.value;}
function setLevel(i,lv){
  S.drops[i].level=S.drops[i].level===lv?'':lv;
  const wrap=document.querySelector(`#dr${i} .level-wrap`);
  if(wrap)wrap.innerHTML=LEVELS.map(l=>`<button class="lvl-btn ${S.drops[i].level===l?'on':''}" onclick="setLevel(${i},'${l}')">${l}</button>`).join('');
}
function aFree(){S.frees.push({name:'',qty:''});render();setTimeout(()=>{const s=document.querySelectorAll('.free-name');if(s.length)s[s.length-1].focus();},50);}
function dFree(i){S.frees.splice(i,1);render();}
function uFree(el,f){S.frees[+el.dataset.fi][f]=el.value;}

function tChkGarbage(id,total){
  S.chk[id]=!S.chk[id];
  const el=document.querySelector(`[onclick="tChkGarbage('${id}','${total}')"]`);
  if(el){const on=S.chk[id];el.classList.toggle('on',on);el.querySelector('.chkbox').textContent=on?'✓':'';
    const lbl=el.querySelector('.chklbl');lbl.style.textDecoration=on?'line-through':'none';lbl.style.color=on?'var(--stone)':'var(--warm)';}
  const items=garbageItems(), done=items.filter(it=>S.chk[it.id]).length;
  const btn=document.getElementById('btn-garbage-next');if(btn)btn.disabled=done!==items.length;
}
function tChk(id){
  S.chk[id]=!S.chk[id];
  const el=document.querySelector(`[onclick="tChk('${id}')"]`);
  if(el){const on=S.chk[id];el.classList.toggle('on',on);el.querySelector('.chkbox').textContent=on?'✓':'';
    const lbl=el.querySelector('.chklbl');lbl.style.textDecoration=on?'line-through':'none';lbl.style.color=on?'var(--stone)':'var(--warm)';}
  const items=chkItems(), done=items.filter(it=>S.chk[it.id]).length, total=items.length;
  const f=document.querySelector('.cpfill'),l=document.querySelector('.cplbl'),b=document.getElementById('bcnxt');
  const pct=total?Math.round(done/total*100):0;
  if(f)f.style.width=pct+'%';if(l)l.textContent=`${done} / ${total} 完了`;if(b)b.disabled=done!==total;
}
function setGlass(v){S.glassOk=v;render();}

// ══ NAVIGATION ════════════════════════════════════════
function go(s){
  if(s==='basic'){
    if(S.staff.length===0){shToast('担当者を選択してください');return;}
    S.date=document.getElementById('idate')?.value||businessDate();
  }else if(s==='groups'){
    S.groups=document.getElementById('igrp')?.value||'0';
  }else if(s==='sales'){
    // その他のみ保存（現金・カードは伝票から自動）
    S.other=document.getElementById('iother')?.value||'0';
  }else if(s==='safe'){
    const r=document.getElementById('idiff');if(r)S.diffReason=r.value;
  }else if(s==='handover'){
    if(S.glassOk===null){shToast('グラスの状態を選択してください');return;}
    S.memo=document.getElementById('imemo')?.value||'';
    setTimeout(()=>sendToSheet(),500);
  }
  st=Math.min(st+1,STEPS.length-1);render();window.scrollTo({top:0,behavior:'smooth'});
}
function back(){st=Math.max(st-1,0);render();window.scrollTo({top:0,behavior:'smooth'});}

// ══ LINE ══════════════════════════════════════════════
function buildLine(){
  const tot=totSales(), dif=safeDif();
  const dtxt=dif===0?'差異なし ✓':(dif>0?`超過 +${dif.toLocaleString()}円`:`不足 ${Math.abs(dif).toLocaleString()}円`);
  const ords=[];
  FIXED.forEach(({name,unit})=>{const q=+S.fix[name]||0;if(q>0)ords.push(`  ・${name}　${q}${unit}`);});
  S.drops.forEach(o=>{if(o.name&&o.level)ords.push(`  ・${o.name}　${o.level}`);});
  S.frees.forEach(o=>{if(o.name)ords.push(`  ・${o.name}${o.qty?' '+o.qty:''}`);});
  const ordtxt=ords.length?ords.join('\n'):'  なし';
  const gtxt=S.glassOk===null?'未確認':S.glassOk?'あり（要確認）⚠️':'なし ✓';
  const rtxt=dif!==0&&S.diffReason?`\n  理由：${S.diffReason}`:'';
  const mtxt=S.memo?`\n📝 引き継ぎ\n${S.memo}`:'';

  // 釣り銭明細（0枚除外）
  const changeLines=BILLS.filter(b=>(+S.change[b]||0)>0)
    .map(b=>`  ${BILL_LBL[b]}　× ${S.change[b]}枚`).join('\n');
  // 両替明細
  const exchLines=BILLS.filter(b=>(+S.exchange[b]||0)>0)
    .map(b=>`  ${BILL_LBL[b]}　× ${S.exchange[b]}枚`).join('\n');
  // 補充が必要な金種（釣り銭＋両替用の合計 vs 目標）
  const needLines=BILLS.filter(b=>BILL_DEFAULT[b]!==undefined)
    .map(b=>{
      const total=(+S.change[b]||0)+(+S.exchange[b]||0);
      const diff=total-BILL_DEFAULT[b];
      return diff<0?`  ${BILL_LBL[b]}　${diff}枚（現在${total}枚／目標${BILL_DEFAULT[b]}枚）`:null;
    })
    .filter(Boolean).join('\n');

  const lA=S.shop==='雨'?'夜雨':'釣り銭';
  const lB=S.shop==='雨'?'昼雨':'両替用';
  const safeBlock=`  ${lA}　　${cn(changeTot())}円${changeLines?'\n'+changeLines:''}\n  ${lB}　　${cn(exchangeTot())}円${exchLines?'\n'+exchLines:''}${needLines?'\n\n📋 補充が必要な金種\n'+needLines:''}`;

  return `【日報】${fd(S.date)}　${S.shop}\n担当：${S.staff.join('・')}\n\n📊 売上\n  現金　　${cn(salesCash())}円\n  カード　${cn(salesCard())}円\n  その他　${cn(salesOther())}円\n  ─────────\n  合計　　${cn(tot)}円\n\n👥 来店：${S.groups}組\n\n🔐 金庫確認\n${safeBlock}\n  ─────────\n  合計　　${cn(safeTot())}円　${dtxt}${rtxt}\n\n📦 発注\n${ordtxt}\n\n🥂 グラス洗い残し：${gtxt}${mtxt}\n\n以上です。お疲れ様でした 🌙`;
}

function cpLine(){
  navigator.clipboard.writeText(buildLine()).then(()=>{
    const b=document.getElementById('cbtn');
    if(b){b.textContent='✓ コピーしました';b.classList.add('done');}
    shToast('コピーしました！');
    setTimeout(()=>{if(b){b.textContent='📋 LINEテンプレをコピー';b.classList.remove('done');}},2000);
  }).catch(()=>shToast('コピーできませんでした'));
}

// ══ SHEET ═════════════════════════════════════════════
function sendToSheet(){
  const status=document.getElementById('send-status');
  const ords=[];
  FIXED.forEach(({name,unit})=>{const q=+S.fix[name]||0;if(q>0)ords.push(`${name} ${q}${unit}`);});
  S.drops.forEach(o=>{if(o.name&&o.level)ords.push(`${o.name} ${o.level}`);});
  S.frees.forEach(o=>{if(o.name)ords.push(`${o.name}${o.qty?' '+o.qty:''}`);});
  const ticketDetail=S.tickets.map(t=>`No.${t.no||'―'}(${({cash:'現金',card:'カード',other:'その他'})[t.pay]})${t.amt}円`).join('、');
  const changeDetail=BILLS.filter(b=>(+S.change[b]||0)>0).map(b=>`${BILL_LBL[b]}×${S.change[b]}`).join('、');
  const exchDetail=BILLS.filter(b=>(+S.exchange[b]||0)>0).map(b=>`${BILL_LBL[b]}×${S.exchange[b]}`).join('、');
  const staffFlags={};MEMBERS.forEach(m=>{staffFlags[m]=S.staff.includes(m)?1:0;});
  const payload={
    shop:S.shop, date:fd(S.date), staff:S.staff.join('・'), groups:S.groups,
    cash:salesCash(), card:salesCard(), other:salesOther(), totalSales:totSales(),
    ticketCash:ticketByPay('cash'), ticketCard:ticketByPay('card'),
    ticketOther:ticketByPay('other'), ticketTotal:ticketTot(),
    ticketDetail:ticketDetail||'なし',
    safeChange:changeTot(), safeExchange:exchangeTot(), safeActual:safeTot(),
    safeDiff:safeDif(), diffReason:S.diffReason||'',
    changeDetail:changeDetail||'', exchDetail:exchDetail||'',
    orders:ords.join('、')||'なし',
    glass:S.glassOk===null?'未確認':S.glassOk?'あり（要確認）':'なし（きれい）',
    memo:S.memo||'', ...staffFlags
  };
  const enc=encodeURIComponent(JSON.stringify(payload));
  const cbName='gasCallback_'+Date.now();
  const timer=setTimeout(()=>{cleanup();done();},8000);
  function cleanup(){clearTimeout(timer);delete window[cbName];const old=document.getElementById('gasScript');if(old)old.remove();}
  function done(){if(status){status.textContent='✓ スプレッドシートに記録されました';status.style.color='var(--matcha)';}}
  window[cbName]=()=>{cleanup();done();};
  const script=document.createElement('script');
  script.id='gasScript';script.src=GAS_URL+'?callback='+cbName+'&data='+enc;
  script.onerror=()=>{cleanup();done();};
  document.body.appendChild(script);
}

function shToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
render();

function resetAll(){
  if(!confirm('新しい日報を始めますか？'))return;
  Object.assign(S,{
    shop:'',date:'',staff:[],groups:'',tickets:[],other:'',
    change:{10000:0,5000:0,1000:0,500:0,100:0,50:0},
    exchange:{10000:0,5000:0,1000:0,500:0,100:0,50:0},
    diffReason:'',fix:{'氷カット':'','丸氷':'','炭酸':''},
    drops:[{name:'',level:''}],frees:[{name:'',qty:''}],chk:{},glassOk:null,memo:''
  });
  tNo='';tAmt='';tPay='';STEPS=buildSteps();st=0;render();
}
function shToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

render();
</script>
